name: standoff_matchmaking
description: Standoff 2 Matchmaking App - Faceit Alternative
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.1
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Charts
  fl_chart: ^0.65.0
  
  # Utils
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true